name: Update Quote
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Update Quote
        run: |
          quotes=('"Code is like humor. When you have to explain it, it’s bad." — Cory House' '"First, solve the problem. Then, write the code." — John Johnson' '"Simplicity is the soul of efficiency." — Austin Freeman' '"Talk is cheap. Show me the code." — Linus Torvalds' '"Programming is not about typing, it is about thinking." — Rich Hickey')
          new_quote=${quotes[$RANDOM % ${#quotes[@]}]}
          # استفاده از راهکار جایگزین برای sed که در لینوکس پایدارتر است
          echo "<!-- QUOTE_START -->" > temp.md
          echo "$new_quote" >> temp.md
          echo "<!-- QUOTE_END -->" >> temp.md
          # جایگزینی محتوا
          perl -i -pe 'BEGIN{undef $/;} s/<!-- QUOTE_START -->.*?<!-- QUOTE_END -->/<!-- QUOTE_START -->\n'"$new_quote"'\n<!-- QUOTE_END -->/s' README.md
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "Update quote automatically" || echo "No changes to commit"
          git push
