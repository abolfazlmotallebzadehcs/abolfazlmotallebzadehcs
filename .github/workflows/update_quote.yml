name: Update Quote
on:
  schedule:
    - cron: '0 0 * * *' # هر ۲۴ ساعت یک بار آپدیت می‌شود
  workflow_dispatch: # یا هر وقت دکمه Run را بزنی آپدیت می‌شود

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update Quote
        run: |
          # در اینجا یک جمله رندوم انتخاب و در README جایگزین می‌شود
          quotes=("Code is poetry." "Talk is cheap. Show me the code." "First, solve the problem. Then, write the code." "Simplicity is the soul of efficiency.")
          quote=${quotes[$RANDOM % ${#quotes[@]}]}
          sed -i "s|<!-- QUOTE_START -->.*<!-- QUOTE_END -->|<!-- QUOTE_START -->$quote<!-- QUOTE_END -->|g" README.md
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "Update quote"
          git push
