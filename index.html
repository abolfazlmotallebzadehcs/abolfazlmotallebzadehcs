<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 0 20px; }
        #quote { text-align: center; font-size: 1.2em; line-height: 1.6; max-width: 800px; font-style: italic; }
        b { color: #58a6ff; font-style: normal; }
    </style>
</head>
<body>
    <div id="quote"></div>
    <script>
        const quotes = [
            "Talk is cheap. Show me the code. — Linus Torvalds",
            "Programs must be written for people to read, and only incidentally for machines to execute. — Harold Abelson",
            "Any fool can write code that a computer can understand. Good programmers write code that humans can understand. — Martin Fowler",
            "First, solve the problem. Then, write the code. — John Johnson",
            "Code is like humor. When you have to explain it, it’s bad. — Cory House",
            "Experience is the name everyone gives to their mistakes. — Oscar Wilde",
            "Java is to JavaScript as car is to Carpet. — Chris Heilmann",
            "Simplicity is the soul of efficiency. — Austin Freeman",
            "Before software can be reusable it first has to be usable. — Ralph Johnson",
            "Make it work, make it right, make it fast. — Kent Beck",
            "Deleted code is debugged code. — Jeff Sickel",
            "The best way to get a project done faster is to start sooner. — Jim Highsmith",
            "Measuring programming progress by lines of code is like measuring aircraft building progress by weight. — Bill Gates",
            "Optimism is an occupational hazard of programming: feedback is the treatment. — Kent Beck",
            "Software is a gas; it expands to fill its container. — Nathan Myhrvold",
            "Programming is not about typing, it's about thinking. — Rich Hickey",
            "Walking on water and developing software from a specification are easy if both are frozen. — Edward V. Berard",
            "It’s not a bug; it’s an undocumented feature. — Anonymous",
            "The most dangerous phrase in the language is, 'We've always done it this way.' — Grace Hopper",
            "Quality is not an act, it is a habit. — Aristotle",
            "If you automate a mess, you get an automated mess. — Rod Michael",
            "The function of good software is to make the complex appear to be simple. — Grady Booch",
            "Testing leads to failure, and failure leads to understanding. — Burt Rutan",
            "Complexity is the enemy of reliability. — Niklaus Wirth",
            "If debugging is the process of removing software bugs, then programming must be the process of putting them in. — Edsger W. Dijkstra",
            "Computers are fast; programmers are slow. — Rick Cook",
            "Good code is its own best documentation. — Steve McConnell",
            "Most good programmers do programming not because they expect to get paid or get adulation by the public, but because it is fun to program. — Linus Torvalds",
            "The only way to learn a new programming language is by writing programs in it. — Dennis Ritchie",
            "Software engineering is what happens to programming when you add time and other programmers. — Titus Winters",
            "Simplicity is prerequisite for reliability. — Edsger W. Dijkstra",
            "Don't comment bad code—rewrite it. — Brian Kernighan",
            "Fix the cause, not the symptom. — Steve Maguire",
            "If you can't explain it simply, you don't understand it well enough. — Albert Einstein",
            "Premature optimization is the root of all evil. — Donald Knuth",
            "Perfection is achieved, not when there is nothing more to add, but when there is nothing left to take away. — Antoine de Saint-Exupéry",
            "Code is poetry. — Anonymous",
            "Your most unhappy customers are your greatest source of learning. — Bill Gates",
            "The art of programming is the art of organizing complexity. — Edsger W. Dijkstra",
            "Debuggers don't fix logic. — David Gelernter",
            "A good programmer looks both ways before crossing a one-way street. — Doug Linder",
            "The best code is no code at all. — Jeff Atwood",
            "Documentation is a love letter that you write to your future self. — Damian Conway",
            "Always code as if the guy who ends up maintaining your code will be a violent psychopath who knows where you live. — John Woods",
            "The best performance improvement is the transition from the nonworking state to the working state. — J. Osterhout",
            "Any code of your own that you haven't looked at for six or more months might as well have been written by someone else. — Eagleson's Law",
            "Hardware is the part of a computer that you can kick. — Jeff Pesis",
            "There are only two hard things in Computer Science: cache invalidation and naming things. — Phil Karlton",
            "The sooner you start to code, the longer the program will take. — Roy Carlson",
            "In software, we rarely have enough time to do it right, but we always have enough time to do it over. — Jessica Kerr"
        ];
        document.getElementById('quote').innerHTML = quotes[Math.floor(Math.random() * quotes.length)];
    </script>
</body>
</html>
