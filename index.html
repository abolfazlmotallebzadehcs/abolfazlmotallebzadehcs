<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <style>
        body { font-family: sans-serif; background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #quote { padding: 20px; text-align: center; font-size: 1.1em; line-height: 1.5; }
    </style>
</head>
<body>
    <div id="quote">Loading...</div>
    <script>
        fetch('https://api.adviceslip.com/advice?t=' + Math.random())
            .then(res => res.json())
            .then(data => {
                document.getElementById('quote').innerHTML = `"${data.slip.advice}"`;
            })
            .catch(() => {
                document.getElementById('quote').innerText = "Keep coding, keep creating!";
            });
    </script>
</body>
</html>
