<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #quote { padding: 15px; text-align: center; font-size: 1.1em; line-height: 1.4; }
    </style>
</head>
<body>
    <div id="quote">Loading...</div>
    <script>
        fetch('https://api.quotable.io/random?tags=technology')
            .then(res => res.json())
            .then(data => {
                document.getElementById('quote').innerHTML = `"${data.content}"<br><br>— <b>${data.author}</b>`;
            })
            .catch(() => { document.getElementById('quote').innerText = "Code is like humor. When you have to explain it, it’s bad."; });
    </script>
</body>
</html>
